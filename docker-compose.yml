services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
    environment:
      - NODE_ENV=production
    # Immutable, read-only container: prod build runs as non-root on a
    # read-only rootfs. tmpfs (mode 1777, sticky+world-writable like /tmp) covers
    # the only paths `next start` writes, so the non-root `node` user can use them.
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /app/.next/cache:mode=1777
    user: "node"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      # Defaults/overrides can be specified here, but we rely on .env
      - DATABASE_URL=${DATABASE_URL:-postgresql://agriverse_user:agriverse_pass@db:5432/agriverse}
      - JWT_SECRET=${JWT_SECRET:-your-agriverse-jwt-secret-here}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEBUG=${DEBUG:-true}
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    command: bash -c "alembic upgrade head && python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-agriverse}
      - POSTGRES_USER=${POSTGRES_USER:-agriverse_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-agriverse_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agriverse_user} -d ${POSTGRES_DB:-agriverse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    # No host ports published — reachable only on the internal compose network.
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://agriverse_user:agriverse_pass@db:5432/agriverse}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    command: python worker.py

  minio:
    image: minio/minio:latest
    # No host ports published — reachable only on the internal compose network.
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/agriverse-cogs --ignore-existing;
      /usr/bin/mc anonymous set download myminio/agriverse-cogs;
      exit 0;
      "

volumes:
  redis_data:
  postgres_data:
  rabbitmq_data:
  minio_data:
