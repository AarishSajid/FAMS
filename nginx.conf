events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Docker's embedded DNS. Re-resolving upstreams per request (via variables
    # below) means nginx survives backend/frontend container recreation instead
    # of caching a stale IP and returning 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # Route API requests to FastAPI
        location /api/ {
            set $fams_backend backend;
            proxy_pass http://$fams_backend:8000$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route everything else to Next.js
        location / {
            set $fams_frontend frontend;
            proxy_pass http://$fams_frontend:3000$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket support for Next.js
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
